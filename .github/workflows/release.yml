name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - name: Check for pre-release tag
        id: check_prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -alpha || "${{ github.ref_name }}" =~ -beta || "${{ github.ref_name }}" =~ -rc ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}

  build-holos-iso:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "contains(github.event.head_commit.message, '[holos]')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/haskell

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            holos/rust/holos-config/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: holos/dl
          key: ${{ runner.os }}-buildroot-dl-${{ hashFiles('holos/Makefile', 'holos/holos-buildroot-2025.08.config') }}

      - name: Cache Buildroot output
        uses: actions/cache@v4
        with:
          path: holos/output
          key: ${{ runner.os }}-buildroot-out-${{ hashFiles('holos/Makefile', 'holos/holos-buildroot-2025.08.config', 'holos/kernel-config-x86_64.config') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget unzip libncurses5-dev libssl-dev bc bison flex libelf-dev make musl-tools xorriso

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-musl
          override: true
          components: rust-src

      - name: Build HolOS ISO
        run: |
          cd holos
          make iso
          # Dynamically find the built ISO
          ISO_NAME=$(find tmp -name "holos-*.iso" -type f -printf "%f\n" | head -n 1)
          if [ -z "$ISO_NAME" ]; then
            echo "Error: No ISO file found in holos/tmp/"
            exit 1
          fi
          echo "Found ISO: $ISO_NAME"
          echo "ISO_ASSET_PATH=holos/tmp/$ISO_NAME" >> $GITHUB_ENV

      - name: Upload ISO to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ISO_ASSET_PATH }}
          asset_name: holos-${{ github.ref_name }}.iso
          asset_content_type: application/octet-stream

  build-and-push-docker-images:
    runs-on: ubuntu-latest
    needs: create-release
    if: github.ref_type == 'tag'
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: "docker/Dockerfile.hc-0.5.6"
            hc_version: "0.5.6"
            backend: "default"
            dev: false
            is_default: false
            platforms: "linux/amd64,linux/arm64"
          - dockerfile: "docker/Dockerfile.hc-0.6.0-go-pion"
            hc_version: "0.6.0"
            backend: "go-pion"
            dev: false
            is_default: true
            platforms: "linux/amd64"
          - dockerfile: "docker/Dockerfile.hc-0.6.1-rc.1"
            hc_version: "0.6.1-rc.1"
            backend: "default"
            dev: true
            is_default: false
            platforms: "linux/amd64,linux/arm64"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG_SUFFIX="hc${{ matrix.hc_version }}"
          if [[ "${{ matrix.backend }}" != "default" ]]; then
            TAG_SUFFIX="${TAG_SUFFIX}-${{ matrix.backend }}"
          fi
          if [[ "${{ matrix.dev }}" == "true" ]]; then
            TAG_SUFFIX="${TAG_SUFFIX}-dev"
          fi
          IMAGE_TAG="${{ github.ref_name }}-${TAG_SUFFIX}"
          LATEST_VERSIONED_TAG="latest-${TAG_SUFFIX}"
          FULL_IMAGE="ghcr.io/holo-host/edgenode:${IMAGE_TAG}"

          # Build amd64 image and load locally for testing
          docker buildx build docker/ --file ${{ matrix.dockerfile }} \
            --platform linux/amd64 \
            --load \
            --tag "${FULL_IMAGE}"

          ./docker/run_tests.sh "${FULL_IMAGE}"

          # Build and push multi-platform image with all applicable tags
          TAGS="--tag ${FULL_IMAGE}"
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == "v"* ]]; then
            TAGS="${TAGS} --tag ghcr.io/holo-host/edgenode:${LATEST_VERSIONED_TAG}"
            if [[ "${{ matrix.is_default }}" == "true" ]]; then
              TAGS="${TAGS} --tag ghcr.io/holo-host/edgenode:latest"
            fi
          fi

          docker buildx build docker/ --file ${{ matrix.dockerfile }} \
            --platform ${{ matrix.platforms }} \
            --push \
            ${TAGS}

  # New job for building and pushing UNYT image (depends on hc-0.6.0 base)
  build-and-push-unyt:
    runs-on: ubuntu-latest
    needs: [create-release, build-and-push-docker-images]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
      packages: write
    env:
      # Use the latest hc-0.6.1-rc.1-dev image as base for unyt
      EDGENODE_HC_0_6_0_IMAGE: "ghcr.io/holo-host/edgenode:latest-hc0.6.1-rc.1-dev"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build UNYT Docker image
        run: |
          cd docker
          TAG_SUFFIX="unyt"
          IMAGE_TAG="${{ github.ref_name }}-${TAG_SUFFIX}"
          LATEST_VERSIONED_TAG="latest-${TAG_SUFFIX}"
          # Build unyt image using the hc-0.6.0-go-pion base
          docker build -f Dockerfile.unyt \
            --tag "ghcr.io/holo-host/edgenode:${IMAGE_TAG}" \
            --build-arg BASE_IMAGE="ghcr.io/holo-host/edgenode:latest-hc0.6.1-rc.1-dev" .

      - name: Push UNYT Docker image
        if: success()
        run: |
          cd docker
          TAG_SUFFIX="unyt"
          IMAGE_TAG="${{ github.ref_name }}-${TAG_SUFFIX}"
          LATEST_VERSIONED_TAG="latest-${TAG_SUFFIX}"

          # Push the UNYT image
          docker push "ghcr.io/holo-host/edgenode:${IMAGE_TAG}"

          # Push the versioned latest tag, but only for non-pre-releases
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == "v"* && "${{ needs.create-release.outputs.is_prerelease }}" == "false" ]]; then
            docker tag "ghcr.io/holo-host/edgenode:${IMAGE_TAG}" "ghcr.io/holo-host/edgenode:${LATEST_VERSIONED_TAG}"
            docker push "ghcr.io/holo-host/edgenode:${LATEST_VERSIONED_TAG}"
          fi
