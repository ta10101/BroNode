name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - name: Check for pre-release tag
        id: check_prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -alpha || "${{ github.ref_name }}" =~ -beta || "${{ github.ref_name }}" =~ -rc ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}

  build-holos-iso:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "contains(github.event.head_commit.message, '[holos]')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/haskell

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            holos/rust/holos-config/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: holos/dl
          key: ${{ runner.os }}-buildroot-dl-${{ hashFiles('holos/Makefile', 'holos/holos-buildroot-2025.08.config') }}

      - name: Cache Buildroot output
        uses: actions/cache@v4
        with:
          path: holos/output
          key: ${{ runner.os }}-buildroot-out-${{ hashFiles('holos/Makefile', 'holos/holos-buildroot-2025.08.config', 'holos/kernel-config-x86_64.config') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget unzip libncurses5-dev libssl-dev bc bison flex libelf-dev make musl-tools xorriso

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-musl
          override: true
          components: rust-src

      - name: Build HolOS ISO
        run: |
          cd holos
          make iso
          ISO_NAME=$(find tmp -name "holos-*.iso" -type f -printf "%f\n" | head -n 1)
          if [ -z "$ISO_NAME" ]; then
            echo "Error: No ISO file found in holos/tmp/"
            exit 1
          fi
          echo "Found ISO: $ISO_NAME"
          echo "ISO_ASSET_PATH=holos/tmp/$ISO_NAME" >> $GITHUB_ENV

      - name: Upload ISO to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ISO_ASSET_PATH }}
          asset_name: holos-${{ github.ref_name }}.iso
          asset_content_type: application/octet-stream

  build-and-push-docker-image:
    runs-on: ubuntu-latest
    needs: create-release
    if: github.ref_type == 'tag'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          VERSION_TAG="ghcr.io/holo-host/edgenode:${{ github.ref_name }}"
          LATEST_TAG="ghcr.io/holo-host/edgenode:latest"

          # Build amd64 image and load locally for testing
          docker buildx build docker/ --file docker/Dockerfile \
            --platform linux/amd64 \
            --load \
            --tag "${VERSION_TAG}"

          CI_RELEASE_TEST=true ./docker/run_tests_multi.sh "${VERSION_TAG}"

          # Build and push multi-platform image tagged as both version and latest
          docker buildx build docker/ --file docker/Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag "${VERSION_TAG}" \
            --tag "${LATEST_TAG}"
