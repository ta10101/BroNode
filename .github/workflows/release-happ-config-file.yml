name: Release happ_config_file

on:
  push:
    tags:
      - 'tools/happ_config_file-v*'

jobs:
  build-and-release-linux:
    name: Build and Release (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    env:
      CRATE_DIR: tools/happ_config_file
      BINARY_NAME: happ_config_file

    strategy:
      matrix:
        include:
          - arch: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - arch: linux-aarch64
            target: aarch64-unknown-linux-gnu
            cross_packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler (aarch64 only)
        if: matrix.cross_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tools/happ_config_file -> target
          key: ${{ matrix.target }}

      - name: Build release binary
        working-directory: ${{ env.CRATE_DIR }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          ARTIFACT="${BINARY_NAME}-${{ matrix.arch }}"
          cp "${CRATE_DIR}/target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${ARTIFACT}"
          strip --strip-all "dist/${ARTIFACT}" || true
          (cd dist && sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256")

      - name: Upload artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: |
            dist/${{ env.BINARY_NAME }}-${{ matrix.arch }}
            dist/${{ env.BINARY_NAME }}-${{ matrix.arch }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/${{ env.BINARY_NAME }}-${{ matrix.arch }}
            dist/${{ env.BINARY_NAME }}-${{ matrix.arch }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
