services:
  edgenode:
    image: ${EDGENODE_IMAGE:-local-edgenode}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      log-collector:
        condition: service_healthy
    environment:
      - IMAGE_NAME=${EDGENODE_IMAGE:-local-edgenode}
      - LOG_SENDER_UNYT_PUB_KEY=${LOG_SENDER_UNYT_PUB_KEY:-uhCAkDM-p0oBsRJn5Ebpk8c_TNkrp2NEwF9C5ppJq8cE77I-n3qfO}
      - LOG_SENDER_REPORT_INTERVAL_SECONDS=${LOG_SENDER_REPORT_INTERVAL_SECONDS:-60}
      - LOG_SENDER_LOG_PATH=${LOG_SENDER_LOG_PATH:-/var/local/lib/holochain/reports/}
      - LOG_SENDER_ENDPOINT=http://log-collector:8787
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - holo-data-test:/data
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "pgrep", "holochain"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  log-collector:
    build:
      context: ./log-collector
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:-test_admin_secret}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  test-net:

volumes:
  holo-data-test:
    driver: local
