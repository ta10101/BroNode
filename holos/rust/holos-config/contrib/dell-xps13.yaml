# A sample/default configuration file suitable for a Dell XPS13 9310
storage:
    system_device: /dev/sda
    data_device: /dev/sda
network:
    nameservers:
    interfaces:
        # Use the onboard controller, with DHCP
        - identifier: !pci_address
            address: "0000:00:14.3"
          static_addresses:
security:
    github_usernames:
    ssh_keys:
    rootpw_hash:
updates:
    channel_url: http://localhost/channels.yaml
    channel_name: release
