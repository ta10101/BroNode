  <rect x="116" y="98" width="31" height="20" rx="7" fill="#0B0B0B" />
  <rect x="104" y="105" width="12" height="5" rx="2.5" fill="#0B0B0B" />
  <circle cx="88.5" cy="108" r="4.5" fill="#FFFFFF" />
  <circle cx="131.5" cy="108" r="4.5" fill="#FFFFFF" />

